# FILE: k8s/base/kustomization.yaml
# PURPOSE: Kustomize entry point for the base (stable) configuration.
#          Overlays (like canary) reference this base and patch on top of it.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - resourcequota.yaml
  - api-gateway-deployment.yaml
  - api-gateway-service.yaml
  - product-service-deployment.yaml
  - product-service-service.yaml
  - ingress.yaml