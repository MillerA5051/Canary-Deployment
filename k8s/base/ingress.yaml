# FILE: k8s/base/ingress.yaml
# PURPOSE: Single entry point into the cluster. Routes external traffic to the
#          api-gateway service. Also where canary traffic splitting is controlled
#          via nginx annotations.
#
# WHAT TO WRITE HERE:
#   - kind: Ingress
#   - annotations:
#       kubernetes.io/ingress.class: "nginx"
#   - rules:
#       host: simulatedfailure.local  (add this to /etc/hosts → 127.0.0.1)
#       http.paths → backend: api-gateway service, port 8000
#
# The canary ingress (with canary-weight annotation) lives in overlays/canary/
# and is a second Ingress object that nginx treats as the canary split.
# Start with this stable-only ingress first, add canary splitting in Phase 3.
