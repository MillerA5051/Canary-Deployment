# FILE: k8s/rbac/serviceaccount.yaml
# PURPOSE: Creates a dedicated ServiceAccount for ArgoCD scoped to this cluster,
#          rather than using the default ServiceAccount or cluster-admin.
#
# WHAT TO WRITE HERE:
#   - kind: ServiceAccount
#   - metadata.name: argocd-manager
#   - metadata.namespace: canary-app
#
# This ServiceAccount is what ArgoCD uses when it applies manifests to the cluster.
# The Role + RoleBinding below restrict what it's actually allowed to do.
