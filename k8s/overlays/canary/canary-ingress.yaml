# FILE: k8s/overlays/canary/canary-ingress.yaml
# PURPOSE: A second Ingress object that nginx treats as the canary split target.
#          nginx reads the canary annotations and routes the configured % of
#          traffic to the canary api-gateway instead of the stable one.
#
# WHAT TO WRITE HERE:
#   - kind: Ingress
#   - annotations:
#       kubernetes.io/ingress.class: "nginx"
#       nginx.ingress.kubernetes.io/canary: "true"
#       nginx.ingress.kubernetes.io/canary-weight: "20"   ← start at 20%
#   - rules: same host as base ingress, but backend points to canary service
#
# The rollback script patches canary-weight to 0 on SLO breach,
# or increments it (20 → 50 → 100) when the canary is healthy.
