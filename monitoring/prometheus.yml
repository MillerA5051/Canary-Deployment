# FILE: monitoring/prometheus.yml
# PURPOSE: Prometheus scrape configuration. Tells Prometheus where to find
#          the /metrics endpoints on your services.

global:
  scrap_interval: 15s

scrap_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: product-service
    static_configs:
      - targets: ["product-service:8001"]