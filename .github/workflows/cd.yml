# FILE: .github/workflows/cd.yml
# PURPOSE: Continuous Delivery — runs on every merge to main.
#          Builds and pushes images, then updates the canary manifest so
#          ArgoCD picks up the new version automatically.

# updates the image tag in the kustomization overlay(GitOps)

name: CD

on: 
    workflow_run:
        workflows: [CI] 
        types: [completed]
    # only fires after CI completes, not on push directly. CD waits for CI to finish building and pushing the images first

jobs:
    update-image:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        # only runs if CI passed. if CI failed, CD doesn't touch git
        runs-on: ubntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Update canary image tag
                    # sed -i : finds the current image tag in kustomization.yaml and replaces it with the new SHA. this is the only thing cd does to the cluster
                run: |
                    sed -i "s|ghcr.io/MillerA5051/api-gateway:.*|ghcr.io/MillerA5051/api-gateway:${{ github.event.workflow_run.head_sha }}|g" k8s/overlays/canary/kustomization.yaml
                    sed -i "s|ghcr.io/MillerA5051/product-service:.*|ghcr.io/MillerA5051/product-service:${{ github.event.workflow_run.head_sha }}|g" k8s/overlays/canary/kustomization.yaml
            
            # commits the one file changed back toyour repo as the github-actions bot user. 
            # argocd sees the new commit, pulls it, and syncs the cluster.
            - name: Commit and push updated tags
                run: |
                git config user.name "github-actions"
                git config user.email "actions@github.com"
                git add k8s/overlays/canary/kustomization.yaml
                git commit -m "cd: update canary image tags to ${{ github.event.workflow_run.head_sha }}"
                git push