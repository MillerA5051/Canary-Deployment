# FILE: .github/workflows/cd.yml
# PURPOSE: Updates the image tag in the canary kustomization overlay after CI succeeds.
#          ArgoCD sees the Git change and syncs the cluster automatically.

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  update-image:
    # only runs if CI passed — if CI failed, CD doesn't touch Git
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # sed -i finds the current image tag in kustomization.yaml and replaces it with the new SHA
      # this is the only thing CD does — edit one file and push it. ArgoCD handles the rest.
      - name: Update canary image tag
        run: |
          sed -i "s|ghcr.io/millera5051/api-gateway:.*|ghcr.io/millera5051/api-gateway:${{ github.event.workflow_run.head_sha }}|g" k8s/overlays/canary/kustomization.yaml
          sed -i "s|ghcr.io/millera5051/product-service:.*|ghcr.io/millera5051/product-service:${{ github.event.workflow_run.head_sha }}|g" k8s/overlays/canary/kustomization.yaml

      # commits the file change back to the repo as the github-actions bot user
      # ArgoCD sees the new commit, pulls it, and syncs the cluster
      - name: Commit and push updated tags
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/overlays/canary/kustomization.yaml
          git commit -m "cd: update canary image tags to ${{ github.event.workflow_run.head_sha }}" || true
          git push
