# FILE: .github/workflows/rollback.yml
# PURPOSE: Manually triggered rollback — sets canary-weight to 0 so nginx
#          stops sending traffic to the canary. ArgoCD syncs the change.

name: Rollback

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for rollback"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # sed -i finds the canary-weight annotation and sets it to "0"
      # ArgoCD sees the Git change and syncs — nginx stops sending traffic to canary
      # 100% of traffic goes back to stable
      - name: Set canary weight to 0
        run: |
          sed -i 's/nginx.ingress.kubernetes.io\/canary-weight: "[0-9]*/nginx.ingress.kubernetes.io\/canary-weight: "0/' k8s/overlays/canary/canary-ingress.yaml

      # commits the change back as the github-actions bot — audit trail of every rollback
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/overlays/canary/canary-ingress.yaml
          git commit -m "rollback: set canary weight to 0 - ${{ github.event.inputs.reason }}"
          git push
